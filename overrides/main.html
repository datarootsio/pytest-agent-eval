{% extends "base.html" %}
{# widget.js appends to document.body with no DOM-ready guard — must load in the scripts block (body-end), NOT extrahead (<head>), or the chat bubble never mounts #}
{% block scripts %}
  {{ super() }}
  <script src="https://context7.com/widget.js"
          data-library="/datarootsio/pytest-agent-eval"
          data-color="#3f51b5"
          data-welcome-message="Ask me anything about pytest-agent-eval — YAML transcripts, evaluators, tool-call assertions, and group thresholds."
          data-placeholder="Ask about pytest-agent-eval"></script>
{% endblock %}
