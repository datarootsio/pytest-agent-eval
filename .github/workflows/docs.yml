name: Deploy Docs

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or branch to (re)deploy (e.g. v0.1.0, v0.2.0, main)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - uses: astral-sh/setup-uv@v5
      - name: Configure git author
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
      - name: Install docs deps + mike fork
        run: |
          uv sync --group docs
          uv pip install git+https://github.com/squidfunk/mike.git
      - name: Resolve version label
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            INPUT="${{ inputs.ref }}"
            if [[ "$INPUT" == v* ]]; then
              echo "kind=tag" >> "$GITHUB_OUTPUT"
              echo "label=$INPUT" >> "$GITHUB_OUTPUT"
            else
              echo "kind=branch" >> "$GITHUB_OUTPUT"
              echo "label=$INPUT" >> "$GITHUB_OUTPUT"
            fi
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "kind=tag" >> "$GITHUB_OUTPUT"
            echo "label=v${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "kind=branch" >> "$GITHUB_OUTPUT"
            echo "label=main" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy with mike
        run: |
          if [[ "${{ steps.ver.outputs.kind }}" == "tag" ]]; then
            uv run mike deploy --push --update-aliases ${{ steps.ver.outputs.label }} latest
          else
            uv run mike deploy --push main
            uv run mike set-default --push main
          fi
