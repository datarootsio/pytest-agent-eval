name: Deploy Docs

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or branch to (re)deploy (e.g. v0.1.0, v0.2.0, main)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - uses: astral-sh/setup-uv@v5
      - name: Configure git author
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
      - name: Install docs deps + mike fork
        run: |
          uv sync --group docs
          uv pip install git+https://github.com/squidfunk/mike.git
      - name: Resolve version label
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            INPUT="${{ inputs.ref }}"
            if [[ "$INPUT" == v* ]]; then
              echo "kind=tag" >> "$GITHUB_OUTPUT"
              echo "label=$INPUT" >> "$GITHUB_OUTPUT"
            else
              echo "kind=branch" >> "$GITHUB_OUTPUT"
              echo "label=$INPUT" >> "$GITHUB_OUTPUT"
            fi
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "kind=tag" >> "$GITHUB_OUTPUT"
            echo "label=v${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "kind=branch" >> "$GITHUB_OUTPUT"
            echo "label=main" >> "$GITHUB_OUTPUT"
          fi
      - name: Generate llms-full.txt
        # Guard for workflow_dispatch redeploys of older tags that predate the script.
        run: |
          if [ -f scripts/build_llms_full.py ]; then
            uv run python scripts/build_llms_full.py -o docs/llms-full.txt
          else
            echo "scripts/build_llms_full.py not present at this ref; skipping"
          fi
      - name: Deploy with mike
        run: |
          if [[ "${{ steps.ver.outputs.kind }}" == "tag" ]]; then
            uv run mike deploy --push --update-aliases ${{ steps.ver.outputs.label }} latest
          else
            uv run mike deploy --push main
            uv run mike set-default --push main
          fi
      - name: Publish llms files and schema at the site root
        run: |
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages gh-pages
          if [[ -d /tmp/gh-pages/main ]]; then
            cp /tmp/gh-pages/main/llms.txt /tmp/gh-pages/llms.txt
            cp /tmp/gh-pages/main/llms-full.txt /tmp/gh-pages/llms-full.txt
            mkdir -p /tmp/gh-pages/schema
            cp /tmp/gh-pages/main/schema/transcript.json /tmp/gh-pages/schema/transcript.json
            cd /tmp/gh-pages
            git add llms.txt llms-full.txt schema/
            if ! git diff --cached --quiet; then
              git commit -m "docs: publish llms files and schema at site root"
              git push origin gh-pages
            fi
          fi
