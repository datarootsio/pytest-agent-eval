[project]
site_name = "pytest-agent-eval"
site_description = "LLM evaluation plugin for pytest — multi-turn YAML transcripts, threshold-based scoring, LLM-as-judge"
site_author = "Dataroots"
site_url = "https://datarootsio.github.io/pytest-agent-eval"
repo_url = "https://github.com/datarootsio/pytest-agent-eval"
repo_name = "datarootsio/pytest-agent-eval"
nav = [
    { "Home" = "index.md" },
    { "Getting started" = "getting-started.md" },
    { "Writing evals" = [{ "YAML API" = "yaml-api.md" }, { "Python API" = "python-api.md" }, { "Evaluators" = "evaluators.md" }, { "Adapters" = "adapters.md" }] },
    { "Running & CI" = [{ "Configuration" = "configuration.md" }, { "Reporting" = "reporting.md" }] },
    { "API reference" = [{ "Overview" = "api-reference/index.md" }, { "Models" = "api-reference/models.md" }, { "Evaluators" = "api-reference/evaluators.md" }, { "Adapters" = "api-reference/adapters.md" }] },
]

[project.theme]
icon.repo = "fontawesome/brands/github"
features = [
    "content.code.copy",
    "content.code.annotate",
    "content.tabs.link",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/datarootsio/pytest-agent-eval"
name = "pytest-agent-eval on GitHub"

[project.extra.version]
provider = "mike"
default = "main"

[project.plugins.mkdocstrings]
enabled = true

[project.plugins.mkdocstrings.config.handlers.python.options]
docstring_style = "google"
show_source = true
show_signature_annotations = true

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
